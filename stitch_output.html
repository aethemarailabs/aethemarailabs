  import { getDictionary } from '@/dictionaries';
import Image from 'next/image';

  title: string;
  label1: string;
  desc1: string;
  label2: string;
  desc2: string;
};

type TeamBlock = {
  title: string;
  director: string;
  leader: string;
  members: string[];
  pain_points?: string[];
  benefits?: string[];

type WhyAethemar = {

  title1: string;
  title2: string;
  subtitle: string;
  details: WhyDetail[];
  traditional_team: TeamBlock;
  aethemar_team: TeamBlock;

const firstParagraph = (value: string) => value.split('\n\n')[0];

                      <div key={member} className="rounded-lg border border-white/5 bg-background/30 px-2 py-2 text-center text-[8.5px] text-on-surface-variant">

                    ))}

                <div className="mt-4 flex flex-wrap justify-center gap-1.5">
